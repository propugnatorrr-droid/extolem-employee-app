workflows:
  android-release:
    name: Extolem Employee App - Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd extolem-app
          npm install
      - name: Expo Prebuild
        script: |
          cd extolem-app
          npx expo prebuild --platform android --clean
      - name: Fix Gradle wrapper version
        script: |
          cd extolem-app/android
          # Downgrade to Gradle 8.3 which is compatible with expo-modules-core
          sed -i 's|gradle-8.*-bin.zip|gradle-8.3-bin.zip|g' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties
          # Set Java 17 explicitly
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
      - name: Build Android APK
        script: |
          cd extolem-app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - extolem-app/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - extolemagency@gmail.com
        notify:
          success: true
          failure: true
