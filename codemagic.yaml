workflows:
  android-release:
    name: Extolem Employee App - Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 11
    scripts:
      - name: Install dependencies
        script: |
          cd extolem-app
          npm install
      - name: Expo Prebuild
        script: |
          cd extolem-app
          npx expo prebuild --platform android --clean
      - name: Fix Gradle settings
        script: |
          cd extolem-app/android
          # Ensure pluginManagement is set correctly for expo modules
          cat settings.gradle
      - name: Build Android APK
        script: |
          cd extolem-app/android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - extolem-app/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - extolemagency@gmail.com
        notify:
          success: true
          failure: true
