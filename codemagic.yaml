workflows:
  android-release:
    name: Extolem Employee App - Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
      vars:
        EXPO_TOKEN: sci8ETBolVy24X3jGtoTi23e4BQkr0vvLTAoZK67
    scripts:
      - name: Install dependencies
        script: |
          cd extolem-app
          npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli@latest
      - name: Build APK locally with EAS
        script: |
          cd extolem-app
          eas build --platform android --profile preview --local --non-interactive --output /tmp/extolem.apk
    artifacts:
      - /tmp/extolem.apk
    publishing:
      email:
        recipients:
          - extolemagency@gmail.com
        notify:
          success: true
          failure: true
